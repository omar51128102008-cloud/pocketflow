<head>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    input, textarea { font-family: 'Outfit', sans-serif; color: #f1f0ff; }
    input:focus, textarea:focus { outline: none; }
    input::placeholder, textarea::placeholder { color: #3d3d55; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop    { from { transform:scale(0); opacity:0; }         to { transform:scale(1); opacity:1; } }
    @keyframes spin   { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeUp 0.3s ease forwards; }

    /* Mobile layout */
    .layout { max-width: 520px; width: 100%; margin: 0 auto; padding-bottom: 110px; }
    .left-panel { width: 100%; }
    .right-panel { padding: 0 20px; }
    .sticky-cta {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 520px;
      background: #050508; border-top: 1px solid #1e1e2e;
      padding: 14px 20px 30px; z-index: 50;
    }

    /* Desktop layout */
    @media (min-width: 900px) {
      body { display: flex; }
      .layout { max-width: 100%; width: 100%; display: flex; flex-direction: row; min-height: 100vh; padding-bottom: 0; }
      .left-panel { width: 400px; flex-shrink: 0; border-right: 1px solid #1e1e2e; min-height: 100vh; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
      .right-panel { flex: 1; padding: 52px 52px 60px; overflow-y: auto; max-width: 720px; }
      .sticky-cta { position: static; transform: none; border-top: 1px solid #1e1e2e; padding: 20px 24px 28px; background: transparent; max-width: none; width: 100%; margin-top: auto; }
      .desktop-summary { display: block !important; }
      .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .time-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)) !important; }
    }

    .card { background: #0e0e14; border: 1px solid #1e1e2e; border-radius: 18px; }
    .btn { background: linear-gradient(135deg,#7c3aed,#a78bfa); border: none; border-radius: 14px; color: #fff; font-family: 'Outfit',sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s; padding: 16px 20px; width: 100%; }
    .btn:disabled { background: #1e1e2e; color: #3d3d55; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.9; }
    .btn-ghost { background: #0e0e14; border: 1px solid #1e1e2e; border-radius: 12px; color: #8b8ba8; font-family: 'Outfit',sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; padding: 8px 14px; display: inline-flex; align-items: center; gap: 6px; }
    .input { width: 100%; background: #16161f; border: 1px solid #1e1e2e; border-radius: 14px; padding: 14px 16px; font-size: 14px; color: #f1f0ff; margin-bottom: 12px; transition: border 0.2s; }
    .input:focus { border-color: #a78bfa; }
    .service-card { display: flex; align-items: center; gap: 14px; background: #0e0e14; border: 1px solid #1e1e2e; border-radius: 18px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
    .service-card:hover { border-color: #a78bfa44; background: #0e0e14; }
    .service-card.sel { background: #a78bfa18; border-color: #a78bfa; }
    .date-chip { padding: 14px 14px; border-radius: 16px; background: #0e0e14; border: 1px solid #1e1e2e; text-align: center; cursor: pointer; flex-shrink: 0; min-width: 72px; transition: all 0.2s; }
    .date-chip.sel { background: linear-gradient(135deg,#7c3aed,#a78bfa); border-color: transparent; }
    .time-chip { padding: 13px 8px; border-radius: 14px; background: #0e0e14; border: 1px solid #1e1e2e; text-align: center; font-size: 13px; font-weight: 600; color: #8b8ba8; cursor: pointer; transition: all 0.2s; }
    .time-chip.sel { background: #a78bfa18; border-color: #a78bfa; color: #a78bfa; }
    .step-bar { height: 3px; border-radius: 2px; transition: background 0.3s; }
    .spinner { width: 20px; height: 20px; border: 2px solid #ffffff44; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; }
    .desktop-summary { display: none; }
  </style>
</head>

function getAvailableDates() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const out = [];
  const today = new Date();
  for (let i = 1; i <= 8; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    out.push(`${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`);
  }
  return out;
}

async function loadBiz() {
  if (!BUSINESS_ID) { biz={name:'Invalid Link',location:'',userId:null}; render(); return; }
  const [profileRes, servicesRes] = await Promise.all([
    sb.from('business_profiles').select('biz_name,location,user_id').eq('user_id',BUSINESS_ID).single(),
    sb.from('services').select('*').eq('owner_id',BUSINESS_ID).neq('active',false).order('created_at',{ascending:true})
  ]);
  if (profileRes.data) {
    biz = { name: profileRes.data.biz_name||'Book an Appointment', location: profileRes.data.location||'', userId: profileRes.data.user_id };
    document.title = `Book · ${biz.name}`;
  } else {
    biz = { name:'Business Not Found', location:'', userId:null };
  }
  if (servicesRes.data && servicesRes.data.length > 0) {
    S.services = servicesRes.data.map(s => ({ id: s.id, name: s.name, price: Number(s.price), duration: s.duration, icon: s.icon||'✨', desc: s.description||'' }));
  }
  render();
}

async function applyPromo() {
  const code = (document.getElementById('f_promo')?.value || '').trim().toUpperCase();
  if (!code) return;
  S.promoCode = code;

  if (!biz.userId) { set({promoResult:{success:false,message:'Cannot validate code.'}}); return; }

  const { data, error } = await sb
    .from('discount_codes')
    .select('*')
    .eq('owner_id', biz.userId)
    .eq('code', code)
    .eq('active', true)
    .single();

  if (error || !data) {
    set({promoResult:{success:false,message:'Code not found or no longer active.'}}); return;
  }
  if (data.usage_limit && data.times_used >= data.usage_limit) {
    set({promoResult:{success:false,message:'This code has reached its usage limit.'}}); return;
  }

  const raw = rawTotal();
  const disc = data.type === 'percent'
    ? Math.round(raw * data.value / 100)
    : Math.min(data.value, raw);

  set({
    discount: disc,
    promoResult: {
      success: true,
      label: data.type === 'percent' ? `${data.value}% off` : `$${data.value} off`,
      codeId: data.id,
    }
  });
}

function buildGCalUrl() {
  try {
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const parts = S.selectedDate.split(' ');
    const month = months[parts[1]]; const day = parseInt(parts[2]);
    const year = new Date().getFullYear();
    const tp = S.selectedTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!tp) return null;
    let hour = parseInt(tp[1]); const min = parseInt(tp[2]);
    if (tp[3].toUpperCase()==='PM' && hour!==12) hour+=12;
    if (tp[3].toUpperCase()==='AM' && hour===12) hour=0;
    const start = new Date(year,month,day,hour,min);
    const end = new Date(start.getTime()+60*60*1000);
    const fmt = d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const title = encodeURIComponent(S.selectedServices.map(s=>s.name).join(' + ')+' at '+biz.name);
    const details = encodeURIComponent('Booked via Pocketflow\nDeposit paid: $'+deposit()+'\nPhone: '+S.phone);
    const loc = encodeURIComponent(biz.location||biz.name);
    return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+fmt(start)+'/'+fmt(end)+'&details='+details+'&location='+loc;
  } catch(e) { return null; }
}

async function handlePay() {
  if (!biz.userId) { set({error:'Invalid booking link.'}); return; }
  set({ paying:true, error:'' });

  try {
    // Step 1: Create PaymentIntent on server
    const piRes = await fetch(`${PROXY}/create-payment-intent`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount: deposit(),
        currency: 'usd',
        metadata: { client_name: S.name, service: S.selectedServices.map(s=>s.name).join(', '), owner_id: biz.userId },
      }),
    });
    const piData = await piRes.json();
    if (!piData.client_secret) throw new Error(piData.error || 'Payment setup failed.');

    // Step 2: Confirm card payment with Stripe
    const { error: stripeErr, paymentIntent } = await stripe.confirmCardPayment(piData.client_secret, {
      payment_method: {
        card: cardElement,
        billing_details: { name: S.cardName },
      },
    });
    if (stripeErr) { set({ paying:false, error: stripeErr.message }); return; }
    if (paymentIntent.status !== 'succeeded') { set({ paying:false, error:'Payment did not complete. Please try again.' }); return; }

    // Step 3: Save appointment to Supabase
    const { error: apptErr } = await sb.from('appointments').insert([{
      client_name: S.name,
      client_avatar: S.name.trim().split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(),
      service: S.selectedServices.map(s=>s.name).join(', '),
      time: S.selectedTime,
      duration: S.selectedServices.map(s=>s.duration).join('+'),
      price: '$'+total(),
      status: 'confirmed',
      note: S.note,
      day: S.selectedDate,
      owner_id: biz.userId,
    }]);
    if (apptErr) { set({ paying:false, error:'Booking saved payment but failed to save appointment: ' + apptErr.message }); return; }

    // Step 4: Add client record (best-effort)
    try {
      await sb.from('clients').insert([{
        name: S.name, phone: S.phone, instagram: S.instagram,
        total_visits: 1, total_spent: total(),
        owner_id: biz.userId,
      }]);
    } catch(e) {}

    // Step 5: Increment promo code usage (best-effort)
    if (S.promoResult?.success && S.promoResult?.codeId) {
      try { await sb.rpc('increment_code_usage', { code_id: S.promoResult.codeId }); } catch(e) {}
    }

    // Step 6: Notify owner + SMS client (best-effort)
    try {
      await fetch(`${PROXY}/notify-booking`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          owner_id: biz.userId,
          client_name: S.name,
          client_phone: S.phone,
          service: S.selectedServices.map(s=>s.name).join(', '),
          date: S.selectedDate,
          time: S.selectedTime,
          deposit: '$'+deposit(),
          biz_name: biz.name,
          note: S.note,
        }),
      });
    } catch(e) {}

    // Step 7: Sync to owner's Google Calendar (best-effort)
    try {
      await fetch(`${PROXY}/add-to-google-calendar`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          owner_id: biz.userId,
          service: S.selectedServices.map(s=>s.name).join(', '),
          date: S.selectedDate, time: S.selectedTime,
          client_name: S.name, biz_name: biz.name,
          biz_location: biz.location || '',
          deposit: '$'+deposit(), phone: S.phone,
        }),
      });
    } catch(e) {}

    set({ paying:false, booked:true });

  } catch(err) {
    set({ paying:false, error: err.message || 'Something went wrong. Please try again.' });
  }
}

        ${renderCTA()}
      </div>
    </div>

    <!-- Right: step content -->
    <div class="right-panel">
      <div class="fade-in" id="stepContent">
        ${renderStep()}
      </div>
    </div>
  </div>`;

  bindEvents();
}

function renderCTA() {
  if (S.step<3) {
    const label = S.step===0
      ? (S.selectedServices.length>0?`Continue · ${S.selectedServices.length} service${S.selectedServices.length>1?'s':''} · $${total()}+`:'Select a service to continue')
      : S.step===1
      ? (S.selectedDate&&S.selectedTime?`Continue · ${S.selectedDate} at ${S.selectedTime}`:'Select date & time')
      : 'Continue to Payment';
    return `
      <button class="btn" id="nextBtn" ${!canNext()?'disabled':''} style="margin-bottom:8px">${label}</button>
      <div style="text-align:center;font-size:11px;color:${C.dim}">🔒 Secure booking · Powered by <span style="color:${C.accent}">Pocketflow</span></div>`;
  }
  return `
    ${S.error?`<div style="background:${C.red}18;border:1px solid ${C.red}33;border-radius:12px;padding:10px 14px;font-size:13px;color:${C.red};margin-bottom:12px">${S.error}</div>`:''}
    <button class="btn" id="payBtn" ${!canNext()||S.paying?'disabled':''}>
      ${S.paying?'<span class="spinner"></span>  Processing...':`Pay $${deposit()} deposit & confirm`}
    </button>
    <div style="text-align:center;font-size:11px;color:${C.dim};margin-top:8px">🔒 Encrypted · Card never stored</div>`;
}

function renderStep() {
  if (S.step===0) return `
    <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:800;margin-bottom:6px">What are you coming in for?</div>
    <div style="font-size:14px;color:${C.mid};margin-bottom:24px">Select one or more services</div>
    ${S.services.length===0 ? `
      <div style="text-align:center;padding:60px 20px;color:${C.dim}">
        <div style="font-size:40px;margin-bottom:12px">✂️</div>
        <div style="font-size:16px;font-weight:700;color:${C.mid};margin-bottom:6px">No services available</div>
        <div style="font-size:13px">The business hasn't added their services yet. Check back soon!</div>
      </div>
    ` : `
    <div class="service-grid">
      ${S.services.map(s=>{
        const sel=S.selectedServices.find(x=>x.id===s.id);
        return `<div class="service-card${sel?' sel':''}" data-service="${s.id}" style="${sel?'':''}">
          <div style="width:50px;height:50px;border-radius:16px;background:${sel?`linear-gradient(135deg,${C.accentDark},${C.accent})`:C.surfaceHigh};display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;transition:background 0.2s">${s.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:700">${s.name}</div>
            <div style="font-size:12px;color:${C.mid};margin-top:2px">${s.desc}</div>
            <div style="font-size:11px;color:${C.dim};margin-top:2px">${s.duration}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:16px;font-weight:800;color:${C.gold}">$${s.price}+</div>
            ${sel?`<div style="font-size:10px;color:${C.accent};font-weight:700;margin-top:3px">✓ Added</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
    `}
    ${S.selectedServices.length>0?`
      <div style="background:${C.accentDark}18;border:1px solid ${C.accentDark}33;border-radius:14px;padding:14px 18px;margin-top:8px">
        <div style="font-size:13px;color:${C.mid};margin-bottom:6px">${S.selectedServices.map(s=>s.name).join(' + ')}</div>
        <div style="font-size:16px;font-weight:800;color:${C.gold}">Total: $${total()}+ &nbsp;·&nbsp; <span style="color:${C.green}">Deposit: $${deposit()}</span></div>
      </div>`:''}`;

  if (S.step===1) return `
    <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:800;margin-bottom:6px">When works for you?</div>
    <div style="font-size:14px;color:${C.mid};margin-bottom:24px">${S.selectedServices.map(s=>s.name).join(' + ')}</div>
    <div style="font-size:11px;color:${C.dim};font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px">Available Dates</div>
    <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;margin-bottom:28px">
      ${DATES.map(d=>{
        const p=d.split(' '), sel=S.selectedDate===d;
        return `<div class="date-chip${sel?' sel':''}" data-date="${d}">
          <div style="font-size:10px;font-weight:700;color:${sel?'#ffffffaa':C.dim};margin-bottom:4px">${p[0].toUpperCase()}</div>
          <div style="font-size:22px;font-weight:800;color:${sel?'#fff':C.text}">${p[2]}</div>
          <div style="font-size:10px;color:${sel?'#ffffffaa':C.dim};margin-top:3px">${p[1]}</div>
        </div>`;
      }).join('')}
    </div>
    ${S.selectedDate?`
      <div class="fade-in">
        <div style="font-size:11px;color:${C.dim};font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px">Available Times</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px" class="time-grid">
          ${TIMES.map(t=>`<div class="time-chip${S.selectedTime===t?' sel':''}" data-time="${t}">${t}</div>`).join('')}
        </div>
      </div>`:''}`;

  if (S.step===2) return `
    <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:800;margin-bottom:6px">Your details</div>
    <div style="font-size:14px;color:${C.mid};margin-bottom:24px">Almost there — just a few details</div>
    <div class="card" style="padding:18px;margin-bottom:24px">
      ${[['Services',S.selectedServices.map(s=>s.name).join(', ')],['Date',S.selectedDate],['Time',S.selectedTime],['Total','$'+total()+'+']].map(([k,v],i,a)=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;${i<a.length-1?'border-bottom:1px solid '+C.border:''}gap:12px">
          <span style="font-size:13px;color:${C.mid};flex-shrink:0">${k}</span>
          <span style="font-size:13px;font-weight:600;text-align:right">${v}</span>
        </div>`).join('')}
    </div>
    <input class="input" id="f_name"      placeholder="Your full name *"              value="${S.name}" />
    <input class="input" id="f_phone"     type="tel" placeholder="Phone number *"     value="${S.phone}" />
    <input class="input" id="f_instagram" placeholder="Instagram (optional)"          value="${S.instagram}" />
    <textarea class="input" id="f_note" placeholder="Notes — hair length, allergies, special requests..." rows="3" style="resize:none;margin-bottom:0">${S.note}</textarea>`;

  if (S.step===3) return `
    <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:800;margin-bottom:6px">Secure your spot</div>
    <div style="font-size:14px;color:${C.mid};margin-bottom:24px">Pay a 30% deposit to confirm your booking</div>
    <div class="card" style="padding:18px;margin-bottom:24px">
      ${[['Services',S.selectedServices.map(s=>s.name).join(', ')],['Date & Time',S.selectedDate+' at '+S.selectedTime],['Total estimate','$'+total()+'+'],['Deposit due now','$'+deposit()]].map(([k,v],i,a)=>`
        <div style="display:flex;justify-content:space-between;padding:9px 0;${i<a.length-1?'border-bottom:1px solid '+C.border:''}gap:12px">
          <span style="font-size:13px;color:${C.mid};flex-shrink:0">${k}</span>
          <span style="font-size:14px;font-weight:${k.includes('Deposit')?800:600};color:${k.includes('Deposit')?C.green:C.text};text-align:right">${v}</span>
        </div>`).join('')}
    </div>
    <div class="card" style="padding:20px;margin-bottom:16px">
      <div style="font-size:11px;color:${C.dim};font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px">Card Details</div>
      <input class="input" id="f_cardName" placeholder="Name on card" value="${S.cardName}" style="margin-bottom:12px" />
      <div id="card-element" style="margin-bottom:4px"></div>
      <div id="card-errors" style="color:#f43f5e;font-size:12px;margin-top:8px"></div>
    </div>
    <div style="display:flex;gap:10px;align-items:flex-start;padding-bottom:8px">
      <span style="font-size:18px;flex-shrink:0">🔒</span>
      <span style="font-size:12px;color:${C.mid};line-height:1.6">Your payment is encrypted and secure. Only the deposit is charged today — remaining balance is due at your appointment.</span>
    </div>
    <div class="card" style="padding:16px;margin-bottom:16px">
      <div style="font-size:11px;color:${C.dim};font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px">Promo Code</div>
      ${S.promoResult && S.promoResult.success
        ? `<div style="display:flex;align-items:center;justify-content:space-between;background:${C.green}18;border:1px solid ${C.green}33;border-radius:12px;padding:12px 14px">
            <div>
              <div style="font-size:13px;font-weight:700;color:${C.green}">✓ ${S.promoCode} applied!</div>
              <div style="font-size:12px;color:${C.mid};margin-top:3px">${S.promoResult.label} · New total: $${total()}+</div>
            </div>
            <button onclick="set({promoCode:'',promoResult:null,discount:0})" style="background:none;border:none;color:${C.dim};font-size:20px;cursor:pointer;padding:0 4px">×</button>
          </div>`
        : `<div style="display:flex;gap:10px">
            <input class="input" id="f_promo" placeholder="Enter promo code" value="${S.promoCode}" style="margin-bottom:0;text-transform:uppercase;letter-spacing:1px;flex:1" />
            <button id="applyPromoBtn" style="background:linear-gradient(135deg,#7c3aed,#a78bfa);border:none;border-radius:14px;color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;padding:0 18px;flex-shrink:0;white-space:nowrap">Apply</button>
          </div>
          ${S.promoResult && !S.promoResult.success ? `<div style="font-size:12px;color:${C.red};margin-top:8px">${S.promoResult.message}</div>` : ''}`
      }
    </div>`;

  return '';
}

// Refresh only the CTA without rebuilding the whole page
function refreshCTA() {
  const area = document.getElementById('ctaArea');
  if (area) { area.innerHTML = renderCTA(); bindCTA(); }
}

function bindCTA() {
  document.getElementById('backBtn')?.addEventListener('click', ()=>set({step:S.step-1,error:''}));
  document.getElementById('nextBtn')?.addEventListener('click', ()=>{ if(canNext()) set({step:S.step+1}); });
  document.getElementById('payBtn')?.addEventListener('click', ()=>{
    S.cardName = document.getElementById('f_cardName')?.value || S.cardName;
    if(canNext() && !S.paying) handlePay();
  });
}

function bindEvents() {
  bindCTA();

  document.querySelectorAll('[data-service]').forEach(el=>
    el.addEventListener('click',()=>{
      const s=S.services.find(x=>String(x.id)===String(el.dataset.service));
      if(s) toggleSvc(s);
    })
  );
  document.querySelectorAll('[data-date]').forEach(el=>
    el.addEventListener('click',()=>set({selectedDate:el.dataset.date,selectedTime:null}))
  );
  document.querySelectorAll('[data-time]').forEach(el=>
    el.addEventListener('click',()=>set({selectedTime:el.dataset.time}))
  );

  // Promo code apply button
  document.getElementById('applyPromoBtn')?.addEventListener('click', applyPromo);
  document.getElementById('f_promo')?.addEventListener('keydown', e=>{ if(e.key==='Enter') applyPromo(); });
  document.getElementById('f_promo')?.addEventListener('input', e=>{ S.promoCode=e.target.value.toUpperCase(); e.target.value=S.promoCode; });

  // Step 2 — update state and refresh CTA so Continue button enables as you type
  [['f_name','name'],['f_phone','phone'],['f_instagram','instagram'],['f_note','note']].forEach(([id,key])=>{
    document.getElementById(id)?.addEventListener('input',e=>{ S[key]=e.target.value; refreshCTA(); });
  });

  document.getElementById('f_cardName')?.addEventListener('input',e=>{
    S.cardName = e.target.value;
    refreshCTA();
  });

  // Mount Stripe Card Element on step 3
  if (S.step === 3 && document.getElementById('card-element')) {
    if (!stripe) stripe = Stripe(STRIPE_PK);
    const elements = stripe.elements({
      fonts: [{ cssSrc: 'https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap' }]
    });
    cardElement = elements.create('card', {
      style: {
        base: { color:'#f1f0ff', fontFamily:"'Outfit', sans-serif", fontSize:'14px', fontWeight:'400', '::placeholder':{ color:'#3d3d55' }, iconColor:'#8b8ba8' },
        invalid: { color:'#f43f5e', iconColor:'#f43f5e' },
      },
      hidePostalCode: true,
    });
    cardElement.mount('#card-element');
    cardElement.on('change', e => {
      cardComplete = e.complete;
      const errEl = document.getElementById('card-errors');
      if (errEl) errEl.textContent = e.error ? e.error.message : '';
      refreshCTA();
    });
  }
}

loadBiz();
</script>
</body>
</html>
