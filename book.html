function getAvailableDates() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const out = [];
  const today = new Date();
  for (let i = 1; i <= 8; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    out.push(`${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`);
  }
  return out;
}

function generateTimesFromHours(hours, dayStr) {
  if (!hours) return ['9:00 AM','10:30 AM','12:00 PM','1:30 PM','3:00 PM','4:30 PM','6:00 PM'];
  const dayMap = { Sun:'sun', Mon:'mon', Tue:'tue', Wed:'wed', Thu:'thu', Fri:'fri', Sat:'sat' };
  const dayKey = dayMap[dayStr.split(' ')[0]];
  if (!dayKey || !hours[dayKey] || hours[dayKey].off) return [];
  const d = hours[dayKey];
  const openParts = d.open.split(':'); const closeParts = d.close.split(':');
  if (!openParts[0] || !closeParts[0]) return [];
  const openMin = parseInt(openParts[0]) * 60 + parseInt(openParts[1] || 0);
  const closeMin = parseInt(closeParts[0]) * 60 + parseInt(closeParts[1] || 0);
  const slots = [];
  for (let m = openMin; m < closeMin; m += 90) {
    let h = Math.floor(m / 60); const min = m % 60;
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h > 12) h -= 12; if (h === 0) h = 12;
    slots.push(`${h}:${String(min).padStart(2,'0')} ${ampm}`);
  }
  return slots;
}

async function applyPromo() {
  const code = (document.getElementById('f_promo')?.value || '').trim().toUpperCase();
  if (!code) return;
  S.promoCode = code;

  if (!biz.userId) { set({promoResult:{success:false,message:'Cannot validate code.'}}); return; }

  const { data, error } = await sb
    .from('discount_codes')
    .select('*')
    .eq('owner_id', biz.userId)
    .eq('code', code)
    .eq('active', true)
    .single();

  if (error || !data) {
    set({promoResult:{success:false,message:'Code not found or no longer active.'}}); return;
  }
  if (data.usage_limit && data.times_used >= data.usage_limit) {
    set({promoResult:{success:false,message:'This code has reached its usage limit.'}}); return;
  }

  const raw = rawTotal();
  const disc = data.type === 'percent'
    ? Math.round(raw * data.value / 100)
    : Math.min(data.value, raw);

  set({
    discount: disc,
    promoResult: {
      success: true,
      label: data.type === 'percent' ? `${data.value}% off` : `$${data.value} off`,
      codeId: data.id,
    }
  });
}

function buildGCalUrl() {
  try {
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const parts = S.selectedDate.split(' ');
    const month = months[parts[1]]; const day = parseInt(parts[2]);
    const year = new Date().getFullYear();
    const tp = S.selectedTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!tp) return null;
    let hour = parseInt(tp[1]); const min = parseInt(tp[2]);
    if (tp[3].toUpperCase()==='PM' && hour!==12) hour+=12;
    if (tp[3].toUpperCase()==='AM' && hour===12) hour=0;
    const start = new Date(year,month,day,hour,min);
    const end = new Date(start.getTime()+60*60*1000);
    const fmt = d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const title = encodeURIComponent(S.selectedServices.map(s=>s.name).join(' + ')+' at '+biz.name);
    const details = encodeURIComponent('Booked via Spool\nDeposit paid: $'+deposit()+'\nPhone: '+S.phone);
    const loc = encodeURIComponent(biz.location||biz.name);
    return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+fmt(start)+'/'+fmt(end)+'&details='+details+'&location='+loc;
  } catch(e) { return null; }
}

async function handlePay() {
  if (!biz.userId) { set({error:'Invalid booking link.'}); return; }

  // Save card element reference BEFORE set() rebuilds the page
  const savedCard = cardElement;
  const savedCardName = S.cardName;

  // Update CTA only (don't rebuild page — that destroys the Stripe element)
  S.paying = true;
  S.error = '';
  refreshCTA();

  try {
    // Step 1: Create PaymentIntent on server
    const piRes = await fetch(`${PROXY}/create-payment-intent`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount: deposit() * 100,
        currency: 'usd',
        metadata: { client_name: S.name, service: S.selectedServices.map(s=>s.name).join(', '), owner_id: biz.userId },
      }),
    });
    const piData = await piRes.json();
    if (!piData.client_secret) throw new Error(piData.error || 'Payment setup failed.');

    // Step 2: Confirm card payment with Stripe
    const { error: stripeErr, paymentIntent } = await stripe.confirmCardPayment(piData.client_secret, {
      payment_method: {
        card: savedCard,
        billing_details: { name: savedCardName },
      },
    });
    if (stripeErr) { S.paying=false; S.error=stripeErr.message; refreshCTA(); return; }
    if (paymentIntent.status !== 'succeeded') { S.paying=false; S.error='Payment did not complete. Please try again.'; refreshCTA(); return; }

    // Step 3: Save appointment to Supabase
    const bookingRef = genRef();
    const { error: apptErr } = await sb.from('appointments').insert([{
      client_name: S.name,
      client_phone: S.phone,
      client_avatar: S.name.trim().split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(),
      service: S.selectedServices.map(s=>s.name).join(', '),
      time: S.selectedTime,
      duration: S.selectedServices.map(s=>s.duration).join('+'),
      price: '$'+total(),
      deposit: '$'+deposit(),
      booking_ref: bookingRef,
      status: 'confirmed',
      note: S.note,
      day: S.selectedDate,
      owner_id: biz.userId,
    }]);
    if (apptErr) { set({ paying:false, error:'Booking saved payment but failed to save appointment: ' + apptErr.message }); return; }

    // Step 4: Add or update client record (best-effort)
    try {
      const { data: existing } = await sb.from('clients')
        .select('id, total_visits, total_spent')
        .eq('owner_id', biz.userId)
        .eq('phone', S.phone)
        .limit(1);
      if (existing && existing.length > 0) {
        await sb.from('clients').update({
          name: S.name,
          instagram: S.instagram,
          email: S.email || undefined,
          total_visits: (existing[0].total_visits || 0) + 1,
          total_spent: (existing[0].total_spent || 0) + total(),
        }).eq('id', existing[0].id);
      } else {
        await sb.from('clients').insert([{
          name: S.name, phone: S.phone, instagram: S.instagram,
          email: S.email || undefined,
          total_visits: 1, total_spent: total(),
          owner_id: biz.userId,
        }]);
      }
    } catch(e) {}

    // Step 5: Increment promo code usage (best-effort)
    if (S.promoResult?.success && S.promoResult?.codeId) {
      try { await sb.rpc('increment_code_usage', { code_id: S.promoResult.codeId }); } catch(e) {}
    }

    // Step 6: Notify owner + SMS client (best-effort)
    try {
      await fetch(`${PROXY}/notify-booking`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          owner_id: biz.userId,
          client_name: S.name,
          client_phone: S.phone,
          client_email: S.email,
          booking_ref: bookingRef,
          service: S.selectedServices.map(s=>s.name).join(', '),
          date: S.selectedDate,
          time: S.selectedTime,
          deposit: '$'+deposit(),
          total: '$'+total(),
          biz_name: biz.name,
          note: S.note,
        }),
      });
    } catch(e) {}

    // Step 7: Sync to owner's Google Calendar (best-effort)
    try {
      await fetch(`${PROXY}/add-to-google-calendar`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          owner_id: biz.userId,
          service: S.selectedServices.map(s=>s.name).join(', '),
          date: S.selectedDate, time: S.selectedTime,
          client_name: S.name, biz_name: biz.name,
          biz_location: biz.location || '',
          deposit: '$'+deposit(), phone: S.phone,
        }),
      });
    } catch(e) {}

    set({ paying:false, booked:true, bookingRef: bookingRef });

  } catch(err) {
    set({ paying:false, error: err.message || 'Something went wrong. Please try again.' });
  }
}

function renderCTA() {
  if (S.step<3) {
    const label = S.step===0
      ? (S.selectedServices.length>0?`Continue · ${S.selectedServices.length} service${S.selectedServices.length>1?'s':''} · $${total()}+`:'Select a service to continue')
      : S.step===1
      ? (S.selectedDate&&S.selectedTime?`Continue · ${S.selectedDate} at ${S.selectedTime}`:'Select date & time')
      : 'Continue to Payment';
    return `
      <button class="btn" id="nextBtn" ${!canNext()?'disabled':''} style="margin-bottom:8px">${label}</button>
      <div style="text-align:center;font-size:11px;color:${C.dim}">🔒 Secure booking · Powered by <span style="color:${C.accent}">Spool</span></div>`;
  }
  return `
    ${S.error?`<div style="background:${C.red}18;border:1px solid ${C.red}33;border-radius:12px;padding:10px 14px;font-size:13px;color:${C.red};margin-bottom:12px">${S.error}</div>`:''}
    <button class="btn" id="payBtn" ${!canNext()||S.paying?'disabled':''}>
      ${S.paying?'<span class="spinner"></span>  Processing...':`Pay $${deposit()} deposit & confirm`}
    </button>
    <div style="text-align:center;font-size:11px;color:${C.dim};margin-top:8px">🔒 Encrypted · Card never stored</div>`;
}

        ? `<div style="display:flex;align-items:center;justify-content:space-between;background:${C.green}18;border:1px solid ${C.green}33;border-radius:12px;padding:12px 14px">
            <div>
              <div style="font-size:13px;font-weight:700;color:${C.green}">✓ ${S.promoCode} applied!</div>
              <div style="font-size:12px;color:${C.mid};margin-top:3px">${S.promoResult.label} · New total: $${total()}+</div>
            </div>
            <button onclick="set({promoCode:'',promoResult:null,discount:0})" style="background:none;border:none;color:${C.dim};font-size:20px;cursor:pointer;padding:0 4px">×</button>
          </div>`
        : `<div style="display:flex;gap:10px">
            <input class="input" id="f_promo" placeholder="Enter promo code" value="${S.promoCode}" style="margin-bottom:0;text-transform:uppercase;letter-spacing:1px;flex:1" />
            <button id="applyPromoBtn" style="background:linear-gradient(135deg,#8b5cf6,#c4b5fd);border:none;border-radius:14px;color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;padding:0 18px;flex-shrink:0;white-space:nowrap">Apply</button>
          </div>
          ${S.promoResult && !S.promoResult.success ? `<div style="font-size:12px;color:${C.red};margin-top:8px">${S.promoResult.message}</div>` : ''}`
      }
    </div>`;

  return '';
}

// Refresh only the CTA without rebuilding the whole page
function refreshCTA() {
  const area = document.getElementById('ctaArea');
  if (area) { area.innerHTML = renderCTA(); bindCTA(); }
}

function bindCTA() {
  document.getElementById('backBtn')?.addEventListener('click', ()=>set({step:S.step-1,error:''}));
  document.getElementById('nextBtn')?.addEventListener('click', ()=>{ if(canNext()) set({step:S.step+1}); });
  document.getElementById('payBtn')?.addEventListener('click', ()=>{
    S.cardName = document.getElementById('f_cardName')?.value || S.cardName;
    if(canNext() && !S.paying) handlePay();
  });
}

function bindEvents() {
  bindCTA();

  document.querySelectorAll('[data-service]').forEach(el=>
    el.addEventListener('click',()=>{
      const s=S.services.find(x=>String(x.id)===String(el.dataset.service));
      if(s) toggleSvc(s);
    })
  );
  document.querySelectorAll('[data-date]').forEach(el=>
    el.addEventListener('click', async ()=>{
      S.selectedDate = el.dataset.date;
      S.selectedTime = null;
      S.bookedTimes = [];
      render();
      await loadBookedTimes(el.dataset.date);
      render();
    })
  );
  document.querySelectorAll('[data-time]').forEach(el=>
    el.addEventListener('click',()=>set({selectedTime:el.dataset.time}))
  );

  // Promo code apply button
  document.getElementById('applyPromoBtn')?.addEventListener('click', applyPromo);
  document.getElementById('f_promo')?.addEventListener('keydown', e=>{ if(e.key==='Enter') applyPromo(); });
  document.getElementById('f_promo')?.addEventListener('input', e=>{ S.promoCode=e.target.value.toUpperCase(); e.target.value=S.promoCode; });

  // Step 2 — update state and refresh CTA so Continue button enables as you type
  [['f_name','name'],['f_phone','phone'],['f_email','email'],['f_instagram','instagram'],['f_note','note']].forEach(([id,key])=>{
    document.getElementById(id)?.addEventListener('input',e=>{ S[key]=e.target.value; refreshCTA(); });
  });

  // Recurring toggle
  document.getElementById('recurToggle')?.addEventListener('click', () => set({ recurring: !S.recurring }));
  document.querySelectorAll('.recur-freq').forEach(el => {
    el.addEventListener('click', () => set({ recurFreq: el.dataset.freq }));
  });

  document.getElementById('f_cardName')?.addEventListener('input',e=>{
    S.cardName = e.target.value;
    refreshCTA();
  });

  // Mount Stripe Card Element on step 3
  if (S.step === 3 && document.getElementById('card-element')) {
    if (!stripe) stripe = Stripe(STRIPE_PK);
    const elements = stripe.elements({
      fonts: [{ cssSrc: 'https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap' }]
    });
    cardElement = elements.create('card', {
      style: {
        base: { color:'#f1f0ff', fontFamily:"'Outfit', sans-serif", fontSize:'14px', fontWeight:'400', '::placeholder':{ color:'#3d3d55' }, iconColor:'#8b8ba8' },
        invalid: { color:'#f43f5e', iconColor:'#f43f5e' },
      },
      hidePostalCode: true,
    });
    cardElement.mount('#card-element');
    cardElement.on('change', e => {
      cardComplete = e.complete;
      const errEl = document.getElementById('card-errors');
      if (errEl) errEl.textContent = e.error ? e.error.message : '';
      refreshCTA();
    });
  }
}

let manageAppt = null;

async function cancelBooking() {
  if (!manageAppt) return;
  try {
    await sb.from('appointments').update({ status: 'cancelled' }).eq('id', manageAppt.id);
    manageCancelled = true;
    renderManage();
  } catch(e) { alert('Failed to cancel. Please try again.'); }
}

function renderManage() {
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.alignItems = 'center';
  app.style.justifyContent = 'center';
  app.style.minHeight = '100vh';

  if (manageLoading) {
    app.innerHTML = `<div style="text-align:center"><div class="spinner" style="width:32px;height:32px;margin:0 auto 16px"></div><div style="color:${C.dim};font-size:14px">Loading your booking...</div></div>`;
    return;
  }

  if (!manageAppt) {
    app.innerHTML = `<div style="text-align:center;max-width:360px;padding:32px"><div style="font-size:52px;margin-bottom:16px">🔍</div><div style="font-family:'DM Sans',sans-serif;font-size:24px;font-weight:800;margin-bottom:10px">Booking Not Found</div><div style="font-size:14px;color:${C.mid};line-height:1.7">We couldn't find a booking with this reference. It may have been cancelled or the link is incorrect.</div></div>`;
    return;
  }

  if (manageCancelled) {
    app.innerHTML = `<div style="text-align:center;max-width:400px;padding:32px" class="fade-in"><div style="width:80px;height:80px;border-radius:24px;background:${C.red}22;border:2px solid ${C.red}44;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 20px">✕</div><div style="font-family:'DM Sans',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px">Booking Cancelled</div><div style="font-size:14px;color:${C.mid};line-height:1.7;margin-bottom:20px">Your appointment has been cancelled. If a deposit was paid, please contact ${biz.name || 'the business'} for refund details.</div>${biz.phone ? `<a href="tel:${biz.phone}" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 0;border-radius:14px;background:${C.accent}18;border:1px solid ${C.accent}33;font-size:14px;font-weight:700;color:${C.accent};text-decoration:none;margin-bottom:16px">📞 Call ${biz.name || 'Business'}</a>` : ''}<div style="font-size:12px;color:${C.dim}">Powered by <span style="color:${C.accent};font-weight:700">Spool</span></div></div>`;
    return;
  }

  const isCancelled = manageAppt.status === 'cancelled';
  // No-show protection: block cancellation within 24h
  let tooLateToCancel = false;
  if (!isCancelled && manageAppt.day && manageAppt.time) {
    try {
      const dayParts = manageAppt.day.split(' '); // e.g. "Wed Mar 19"
      const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
      const monthIdx = months[dayParts[1]] ?? -1;
      const dayNum = parseInt(dayParts[2]);
      const timeParts = manageAppt.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (monthIdx >= 0 && dayNum && timeParts) {
        let h = parseInt(timeParts[1]);
        const m = parseInt(timeParts[2]);
        const ampm = timeParts[3].toUpperCase();
        if (ampm === 'PM' && h < 12) h += 12;
        if (ampm === 'AM' && h === 12) h = 0;
        const apptDate = new Date(new Date().getFullYear(), monthIdx, dayNum, h, m);
        const hoursUntil = (apptDate - new Date()) / 3600000;
        if (hoursUntil < 24 && hoursUntil > -24) tooLateToCancel = true;
      }
    } catch(e) {}
  }
  app.innerHTML = `
  <div style="max-width:480px;width:100%;padding:32px" class="fade-in">
    <div style="text-align:center;margin-bottom:24px">
      <div style="width:70px;height:70px;border-radius:22px;background:${isCancelled ? C.red+'22' : C.accent+'22'};border:2px solid ${isCancelled ? C.red+'44' : C.accent+'44'};display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px">${isCancelled ? '✕' : '📅'}</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:26px;font-weight:800;margin-bottom:4px">Your Booking</div>
      <div style="font-size:14px;color:${C.mid}">${biz.name || ''}${biz.location ? ' · '+biz.location : ''}</div>
    </div>
    <div class="card" style="padding:18px;margin-bottom:20px">
      ${[['Service', manageAppt.service], ['Date', manageAppt.day], ['Time', manageAppt.time], ['Status', manageAppt.status?.charAt(0).toUpperCase()+manageAppt.status?.slice(1)], ['Deposit', manageAppt.deposit || '—'], ['Ref', MANAGE_REF]].map(([k,v],i,a) => `
        <div style="display:flex;justify-content:space-between;padding:10px 0;${i<a.length-1?'border-bottom:1px solid '+C.border:''}gap:12px">
          <span style="font-size:13px;color:${C.mid};flex-shrink:0">${k}</span>
          <span style="font-size:14px;font-weight:600;color:${k==='Status'?(v==='Confirmed'?C.green:v==='Cancelled'?C.red:C.text):C.text};text-align:right">${v}</span>
        </div>`).join('')}
    </div>
    ${!isCancelled ? (tooLateToCancel ? `
      <div style="text-align:center;padding:14px;background:${C.red}12;border:1px solid ${C.red}33;border-radius:14px;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:${C.red};margin-bottom:4px">Cannot cancel within 24 hours</div>
        <div style="font-size:12px;color:${C.mid}">Please contact the business directly to make changes.</div>
      </div>
    ` : `
      <button class="btn" id="cancelBookingBtn" style="width:100%;padding:15px;background:${C.red};margin-bottom:12px">Cancel Booking</button>
      <div style="font-size:12px;color:${C.dim};text-align:center;line-height:1.6">Need to reschedule? Cancel and rebook with a new time.</div>
    `) : `<div style="text-align:center;font-size:13px;color:${C.dim}">This booking has been cancelled.</div>`}
    ${biz.phone || biz.name ? `
    <div class="card" style="padding:16px;margin-top:16px">
      <div style="font-size:11px;color:${C.dim};font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Contact Business</div>
      ${biz.name ? `<div style="font-size:14px;font-weight:600;margin-bottom:4px">${biz.name}</div>` : ''}
      ${biz.location ? `<div style="font-size:13px;color:${C.mid};margin-bottom:8px">${biz.location}</div>` : ''}
      ${biz.phone ? `<a href="tel:${biz.phone}" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 0;border-radius:12px;background:${C.accent}18;border:1px solid ${C.accent}33;font-size:14px;font-weight:700;color:${C.accent};text-decoration:none">📞 Call ${biz.phone}</a>` : ''}
    </div>` : ''}
    <div style="text-align:center;margin-top:20px;font-size:12px;color:${C.dim}">Powered by <span style="color:${C.accent};font-weight:700">Spool</span></div>
  </div>`;

  document.getElementById('cancelBookingBtn')?.addEventListener('click', () => {
    if (confirm('Are you sure you want to cancel this booking?')) cancelBooking();
  });
}

// ── CLIENT PORTAL ──
let portalPhone = '';
let portalAppts = null;
let portalLoading = false;
let portalBizName = '';

async function loadPortal() {
  if (!BUSINESS_ID) return;
  const { data: bp } = await sb.from('business_profiles').select('biz_name').eq('user_id', BUSINESS_ID).single();
  portalBizName = bp?.biz_name || 'Business';
  renderPortal();
}

async function searchPortalAppts() {
  const phone = portalPhone.replace(/\D/g, '');
  if (phone.length < 7) { alert('Please enter a valid phone number'); return; }
  portalLoading = true;
  renderPortal();

  // Search by phone with various formats
  const formats = [phone, '+' + phone, '+1' + phone, '(' + phone.slice(0,3) + ') ' + phone.slice(3,6) + '-' + phone.slice(6)];
  let allAppts = [];
  for (const fmt of formats) {
    const { data } = await sb.from('appointments').select('*').eq('owner_id', BUSINESS_ID).eq('client_phone', fmt).order('created_at', { ascending: false });
    if (data && data.length > 0) { allAppts = data; break; }
  }
  // Also try matching by name via clients table
  if (allAppts.length === 0) {
    for (const fmt of formats) {
      const { data: clients } = await sb.from('clients').select('name').eq('owner_id', BUSINESS_ID).eq('phone', fmt).limit(1);
      if (clients && clients[0]) {
        const { data } = await sb.from('appointments').select('*').eq('owner_id', BUSINESS_ID).eq('client_name', clients[0].name).order('created_at', { ascending: false });
        if (data) allAppts = data;
        break;
      }
    }
  }
  portalAppts = allAppts;
  portalLoading = false;
  renderPortal();
}

      ${past.slice(0,5).map(a => `
        <div class="card" style="padding:14px 16px;margin-bottom:8px;opacity:0.7">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:14px;font-weight:600">${a.service}</div><div style="font-size:12px;color:${C.dim};margin-top:2px">${a.day} · ${a.time}</div></div>
            <div style="font-size:13px;font-weight:700;color:${a.status==='cancelled'?C.red:C.green};text-transform:capitalize">${a.status}</div>
          </div>
        </div>
      `).join('')}
    ` : ''}
    <div style="text-align:center;margin-top:24px">
      <a href="?id=${BUSINESS_ID}" class="btn" style="display:inline-block;text-decoration:none;padding:14px 32px">Book New Appointment</a>
    </div>
    <div style="text-align:center;margin-top:16px">
      <span onclick="portalAppts=null;renderPortal()" style="font-size:12px;color:${C.dim};cursor:pointer">Search different number</span>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:${C.dim}">Powered by <span style="color:${C.accent};font-weight:700">Spool</span></div>
  </div>`;
}

if (PORTAL && BUSINESS_ID) { loadPortal(); } else if (REVIEW_REF) { loadReview(); } else if (MANAGE_REF) { loadManageBooking(); } else { loadBiz(); }
</script>
</body>
</html>
